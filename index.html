
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Água 3000</title>
<link rel="manifest" href="manifest.json">
<style>
body{
 font-family:Arial, sans-serif;
 background:#0ea5e9;
 color:white;
 text-align:center;
 padding:20px
}
.card{
 background:white;
 color:#0f172a;
 border-radius:16px;
 padding:20px;
 max-width:420px;
 margin:auto
}
button{
 padding:14px 20px;
 margin-top:10px;
 border:none;
 border-radius:12px;
 font-size:16px;
 background:#22c55e;
 color:white;
}
#bottle{
 width:120px;
 height:260px;
 border:4px solid #0f172a;
 border-radius:20px 20px 10px 10px;
 margin:20px auto;
 position:relative;
 overflow:hidden;
 background:white;
}
#water{
 position:absolute;
 bottom:0;
 width:100%;
 height:0%;
 background:#38bdf8;
 transition:height 0.5s;
}
.small{
 font-size:14px;
 color:#334155
}
</style>
</head>

<body>

<h1>💧 Água 3000</h1>

<div class="card">

<p>Meta diária: <b>3000 ml</b></p>

<div id="bottle">
<div id="water"></div>
</div>

<h2 id="total">0 ml</h2>

<button onclick="drink()">Já bebi 250 ml</button>

<p id="msg"></p>
<p class="small">Lembretes de 08:00 até 20:00</p>

</div>

<script>

const GOAL = 3000
const STEP = 250
let total = Number(localStorage.getItem("waterTotal") || 0)

function update(){

 document.getElementById("total").innerText = total + " ml"

 let percent = (total/GOAL)*100
 document.getElementById("water").style.height = percent + "%"

 if(total >= GOAL){
  document.getElementById("msg").innerText = "🎉 Meta atingida hoje!"
 }

 localStorage.setItem("waterTotal", total)
}

function drink(){
 total += STEP
 if(total > GOAL) total = GOAL
 update()
}

function resetDaily(){
 const today = new Date().toDateString()
 const saved = localStorage.getItem("day")

 if(saved !== today){
   localStorage.setItem("day", today)
   total = 0
   localStorage.setItem("waterTotal",0)
 }
}

function notify(){
 const hour = new Date().getHours()

 if(hour >= 8 && hour <= 20){
   if(Notification.permission === "granted"){
      new Notification("Hora de beber água 💧",{
        body:"Beba 250 ml agora e toque em 'Já bebi'"
      })
   }
 }
}

async function initNotifications(){

 if("Notification" in window){
   const perm = await Notification.requestPermission()

   if(perm === "granted"){

     setInterval(notify, 60*60*1000)
   }
 }

}

resetDaily()
update()
initNotifications()

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
